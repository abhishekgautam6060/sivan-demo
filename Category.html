<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Aura Collection</title>

    <link rel="stylesheet" href="css/category.css">

</head>

<body>

    <div class="category-container">

        <!-- HERO SECTION -->
    <section class="hero">

        <div class="navbar">

            <div class="left-icons">
                <i class="fas fa-bars"></i>
                <i class="fas fa-search"></i>
            </div>

            <div class="logo" onclick="goToHome()">
                SIVAN
            </div>

            <div class="right-icons">
                <i class="far fa-user"></i>
                <i class="fas fa-shopping-bag"></i>
            </div>

        </div>

    </section>


        <!-- TITLE -->

        <h1 class="category-title">AURA</h1>


        <!-- PRODUCT COUNT + FILTER -->

        <div class="category-top">

            <p>2 products</p>

            <p class="filter">Filter & Sort</p>

        </div>


        <!-- PRODUCT LIST -->

        <div class="product-list">


            <!-- PRODUCT 1 -->

            <div class="product-card" onclick="goToProduct()">

                <div class="product-img">

                    <img src="./image/aura.jpg">

                    <span class="discount">25% OFF</span>

                </div>

                <h3>The Rust Orange Chinon saree</h3>

                <p class="price">

                    <span class="old">₹2,200.00</span>

                    ₹1,650.00

                </p>

            </div>


            <!-- PRODUCT 2 -->

            <div class="product-card" onclick="goToProduct()">

                <div class="product-img">

                    <img src="./image/main.jpg">

                    <span class="discount">25% OFF</span>

                </div>

                <h3>The Mustard Yellow Chinon Saree</h3>

                <p class="price">

                    <span class="old">₹1,999.00</span>

                    ₹1,499.25

                </p>

            </div>


        </div>

    </div>

    <footer>

        <ul>
            <li>About us</li>
            <li>Shipping Policy</li>
            <li>Terms & Conditions</li>
            <li>Contact us</li>
            <li>Shipping Policy</li>
        </ul>

    </footer>
    <script src="js/category.js"></script>
</body>

</html>
